<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PII Redactor</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main>
        <h1>PII Redactor</h1>
        <p>CSV / Excel / EML ファイルをアップロードして、個人情報をプレースホルダに置き換えます。</p>
        <form id="uploadForm">
            <input type="file" id="fileInput" name="file" required />
            <div class="slider-group">
                <label for="sensitivity">検出強度: <span id="sensitivityValue">50</span>%</label>
                <input id="sensitivity" name="sensitivity" type="range" min="0" max="100" value="50" />
            </div>
            <label class="checkbox-group">
                <input id="forceSavePicker" type="checkbox" checked /> 保存先指定を優先して保存する
            </label>
            <button type="submit">アップロードして置換</button>
            <button id="saveButton" type="button" hidden>保存先を指定して保存</button>
            <button id="cancelButton" type="button" hidden>処理をキャンセル</button>
        </form>
        <div id="progressContainer" hidden>
            <div class="progress-bar">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <div id="progressText"></div>
        </div>
        <div id="message"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
